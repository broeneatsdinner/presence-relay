# Sanitized example route fragment for the public relay.
# Replace deployment-specific listener, TLS, and host settings outside this file.

$HTTP["url"] == "/hook/homekit" {
	# Only allow POST
	$HTTP["request-method"] != "POST" {
		url.access-deny = ( "" )
	}

	proxy.server = ( "" => ( ( "host" => "127.0.0.1", "port" => 8787 ) ) )
}
